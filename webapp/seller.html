<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyerKing — Seller Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6c63ff;
            --accent2: #e94560;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #f0f4ff;
            --muted: rgba(255, 255, 255, 0.45);
            --font: 'Outfit', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 0% 0%, hsla(245, 60%, 20%, 0.6) 0, transparent 55%),
                radial-gradient(ellipse at 100% 0%, hsla(340, 55%, 20%, 0.5) 0, transparent 55%),
                radial-gradient(ellipse at 50% 100%, hsla(220, 50%, 12%, 0.8) 0, transparent 60%);
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-link {
            padding: 8px 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-family: var(--font);
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-link:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--success);
        }

        .status-dot::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── Stats bar ──────────────────────────────────── */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 22px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 130px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-value.pending {
            color: var(--warning);
        }

        .stat-value.accepted {
            color: var(--success);
        }

        .stat-value.rejected {
            color: var(--danger);
        }

        .stat-value.total {
            color: var(--accent);
        }

        /* ── Main content ───────────────────────────────── */
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .section-title .count-badge {
            background: var(--accent);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* ── Order Cards ────────────────────────────────── */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px 26px;
            transition: transform 0.2s, border-color 0.3s;
            animation: slideIn 0.35s ease;
        }

        .order-card:hover {
            transform: translateY(-2px);
            border-color: rgba(108, 99, 255, 0.3);
        }

        .order-card.accepted {
            border-color: rgba(16, 185, 129, 0.35);
            background: rgba(16, 185, 129, 0.04);
        }

        .order-card.rejected {
            border-color: rgba(239, 68, 68, 0.25);
            background: rgba(239, 68, 68, 0.04);
        }

        .order-card.pending {
            border-color: rgba(245, 158, 11, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .order-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .order-id {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .order-buyer {
            font-size: 1rem;
            font-weight: 600;
        }

        .order-time {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .status-badge {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-badge.accepted {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        /* ── Items list ─────────────────────────────────── */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .item-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .item-price {
            font-size: 0.88rem;
            color: var(--accent2);
            font-weight: 600;
        }

        .order-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .order-total {
            font-size: 1rem;
            font-weight: 700;
        }

        .order-total span {
            color: var(--success);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-accept,
        .btn-reject {
            padding: 9px 20px;
            border-radius: 24px;
            border: none;
            font-family: var(--font);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-accept {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .btn-accept:hover:not(:disabled) {
            background: var(--success);
            color: white;
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.35);
        }

        .btn-reject:hover:not(:disabled) {
            background: var(--danger);
            color: white;
        }

        .btn-accept:disabled,
        .btn-reject:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Empty / Loading states ─────────────────────── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 60px 20px;
            color: var(--muted);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Notification toast ─────────────────────────── */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 22px;
            font-size: 0.9rem;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 9999;
            max-width: 320px;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #toast.success {
            border-color: rgba(16, 185, 129, 0.5);
        }

        #toast.error {
            border-color: rgba(239, 68, 68, 0.5);
        }

        #toast.info {
            border-color: rgba(108, 99, 255, 0.5);
        }

        /* ── Filter tabs ────────────────────────────────── */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .filter-tab {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: var(--font);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab.active,
        .filter-tab:hover {
            background: var(--surface);
            color: var(--text);
            border-color: var(--accent);
        }

        @media (max-width: 640px) {
            .header {
                padding: 14px 18px;
            }

            .stats-bar {
                padding: 16px 18px;
                flex-wrap: wrap;
            }

            .main {
                padding: 20px 18px;
            }

            .order-footer {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }

            .action-buttons {
                justify-content: stretch;
            }

            .btn-accept,
            .btn-reject {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="brand">
            <div class="brand-icon">👑</div>
            <div>
                <div class="brand-title">BuyerKing</div>
                <div class="brand-sub">Seller Dashboard</div>
            </div>
        </div>
        <div class="header-actions">
            <div class="status-dot" id="liveStatus">Live</div>
            <a href="/" class="btn-link">🛒 Buyer View</a>
        </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value total" id="statTotal">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value pending" id="statPending">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Accepted</div>
            <div class="stat-value accepted" id="statAccepted">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Rejected</div>
            <div class="stat-value rejected" id="statRejected">—</div>
        </div>
    </div>

    <!-- Main content -->
    <main class="main">
        <div class="section-title">
            Incoming Orders
            <span class="count-badge" id="orderCount">0</span>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">All</button>
            <button class="filter-tab" data-filter="pending" onclick="setFilter('pending', this)">⏳ Pending</button>
            <button class="filter-tab" data-filter="accepted" onclick="setFilter('accepted', this)">✅ Accepted</button>
            <button class="filter-tab" data-filter="rejected" onclick="setFilter('rejected', this)">❌ Rejected</button>
        </div>

        <div id="ordersList">
            <div class="loading-spinner">
                <div class="spinner"></div> Loading orders…
            </div>
        </div>
    </main>

    <!-- Toast notification -->
    <div id="toast"></div>

    <script src="js/seller.js"></script>
</body>

</html>
