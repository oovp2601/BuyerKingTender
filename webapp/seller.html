<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyerKing — Seller Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #111;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: #fff;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .brand-sub {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 28px;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin: 0 8px 10px;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 24px;
        }

        .nav-btn {
            padding: 9px 12px;
            border-radius: 8px;
            border: none;
            background: none;
            color: #444;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-align: left;
            transition: 0.15s;
        }

        .nav-btn:hover {
            background: #f5f5f5;
            color: #111;
        }

        .nav-btn.active {
            background: #111;
            color: #fff;
        }

        .sidebar-footer {
            margin-top: auto;
        }

        .back-link {
            display: block;
            padding: 10px 12px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-size: 0.875rem;
            text-align: center;
            transition: 0.15s;
        }

        .back-link:hover {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        /* ── Content Area ── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 16px 28px;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .live-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #16a34a;
            font-weight: 500;
        }

        .live-dot::before {
            content: '';
            width: 7px;
            height: 7px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .3;
            }
        }

        /* ── Stats ── */
        .stats {
            display: flex;
            gap: 16px;
            padding: 20px 28px;
            border-bottom: 1px solid #e5e5e5;
            background: #fff;
        }

        .stat-card {
            flex: 1;
            padding: 16px 20px;
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-value.total {
            color: #111;
        }

        .stat-value.pending {
            color: #d97706;
        }

        .stat-value.accepted {
            color: #16a34a;
        }

        .stat-value.rejected {
            color: #dc2626;
        }

        /* ── Orders List ── */
        .orders-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            background: #f5f5f5;
        }

        .orders-area::-webkit-scrollbar {
            width: 4px;
        }

        .orders-area::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .section-count {
            background: #111;
            color: #fff;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .order-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 20px;
            transition: 0.2s;
        }

        .order-card:hover {
            border-color: #bbb;
        }

        .order-card.pending {
            border-left: 4px solid #d97706;
        }

        .order-card.accepted {
            border-left: 4px solid #16a34a;
        }

        .order-card.rejected {
            border-left: 4px solid #dc2626;
        }

        .order-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .order-id {
            font-size: 0.75rem;
            color: #888;
        }

        .order-buyer {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .order-time {
            font-size: 0.78rem;
            color: #aaa;
        }

        .order-address {
            font-size: 0.8rem;
            color: #3b82f6;
            margin-top: 2px;
        }

        .order-note {
            font-size: 0.8rem;
            color: #d97706;
            margin-top: 4px;
            font-style: italic;
            background: #fffbeb;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pill.pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-pill.accepted {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-pill.rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        .order-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: #fafafa;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .item-price {
            color: #333;
            font-weight: 500;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }

        .order-total {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .order-total span {
            color: #111;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-accept {
            background: #f0fdf4;
            color: #16a34a;
            border-color: #86efac;
        }

        .btn-accept:hover:not(:disabled) {
            background: #16a34a;
            color: #fff;
        }

        .btn-reject {
            background: #fff5f5;
            color: #dc2626;
            border-color: #fca5a5;
        }

        .btn-reject:hover:not(:disabled) {
            background: #dc2626;
            color: #fff;
        }

        .btn-chat {
            background: #f5f3ff;
            color: #7c3aed;
            border-color: #c4b5fd;
        }

        .btn-chat:hover {
            background: #7c3aed;
            color: #fff;
        }

        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 0.9rem;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            transform: translateY(60px);
            opacity: 0;
            transition: 0.3s;
            z-index: 999;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #toast.success {
            background: #16a34a;
        }

        #toast.error {
            background: #dc2626;
        }

        #toast.info {
            background: #2563eb;
        }

        /* ── Chat Modal ── */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 200;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            z-index: 300;
            width: 90%;
            max-width: 460px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
        }

        .modal h3 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .modal p {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 16px;
        }

        .chat-hist-box {
            height: 240px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow-y: auto;
            padding: 12px;
            background: #fafafa;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .seller-msg-bubble {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            max-width: 80%;
            word-break: break-word;
        }

        .seller-msg-bubble.mine {
            background: #111;
            color: #fff;
            align-self: flex-end;
        }

        .seller-msg-bubble.theirs {
            background: #f0f0f0;
            color: #111;
            align-self: flex-start;
        }

        .modal-input {
            flex: 1;
            padding: 10px 13px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
        }

        .modal-input:focus {
            border-color: #111;
        }

        .btn-sm {
            padding: 10px 16px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .btn-sm-cancel {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">BuyerKing</div>
        <div class="brand-sub">Seller Dashboard</div>

        <div class="nav-label">Order Status</div>
        <div class="nav-group">
            <button class="nav-btn active" data-filter="all" onclick="setFilter('all', this)">📦 All Orders</button>
            <button class="nav-btn" data-filter="pending" onclick="setFilter('pending', this)">⏳ Pending</button>
            <button class="nav-btn" data-filter="accepted" onclick="setFilter('accepted', this)">✅ Accepted</button>
            <button class="nav-btn" data-filter="rejected" onclick="setFilter('rejected', this)">❌ Rejected</button>
        </div>

        <div class="nav-label">Category</div>
        <div class="nav-group">
            <button class="nav-btn cat-filter-btn active" onclick="setCategoryFilter('all', this)">🌐 All</button>
            <button class="nav-btn cat-filter-btn" onclick="setCategoryFilter('Food', this)">🍔 Food</button>
            <button class="nav-btn cat-filter-btn" onclick="setCategoryFilter('Beverages', this)">🥤 Beverages</button>
            <button class="nav-btn cat-filter-btn" onclick="setCategoryFilter('Snacks', this)">🍪 Snacks</button>
            <button class="nav-btn cat-filter-btn" onclick="setCategoryFilter('Electronics', this)">💻
                Electronics</button>
        </div>

        <div class="sidebar-footer">
            <a href="/" class="back-link">← Back to Storefront</a>
        </div>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="topbar">
            <h2>Order Management</h2>
            <div class="live-dot" id="liveStatus">Live</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total</div>
                <div class="stat-value total" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-value pending" id="statPending">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Accepted</div>
                <div class="stat-value accepted" id="statAccepted">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Rejected</div>
                <div class="stat-value rejected" id="statRejected">—</div>
            </div>
        </div>

        <div class="orders-area">
            <div class="section-header">
                <h3>Incoming Orders</h3>
                <span class="section-count" id="orderCount">0</span>
            </div>
            <div class="orders-list" id="ordersList">
                <div class="empty-state">Loading orders...</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Chat Modal Overlay -->
    <div class="overlay" id="modalOverlay"></div>
    <div class="modal" id="chatModal">
        <h3>Chat with Buyer</h3>
        <p>Reply to <strong id="chatBuyerNameText"></strong></p>
        <p id="chatBuyerName" style="display:none;"></p>
        <div id="sellerChatHistory" class="chat-hist-box">
            <div style="text-align:center; color:#ccc; font-size:0.8rem;">Start of conversation</div>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:12px;">
            <input type="text" id="chatMessage" class="modal-input" placeholder="Type a reply..."
                onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button class="btn-sm" onclick="sendChatMessage()">Send</button>
        </div>
        <div style="text-align:right;">
            <button class="btn-sm-cancel" onclick="closeChatModal()">Close</button>
        </div>
    </div>

    <script src="js/seller.js"></script>
</body>

</html>
