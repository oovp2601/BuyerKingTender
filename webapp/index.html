<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyerKing - Your AI Shopping Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Inline overrides for full-page */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        #app-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #chat-container {
            width: 100%;
            max-width: 800px;
            /* Limit width on large screens */
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            color: white;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        header p {
            margin: 5px 0 0;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #chat-input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        input#message-input {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }

        button#send-btn {
            padding: 0 25px;
            border-radius: 25px;
            border: none;
            background: #0f3460;
            color: #e94560;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button#send-btn:hover {
            background: #16213e;
        }

        /* Interactive Elements */
        .menu-chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .chip {
            padding: 8px 15px;
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .chip:hover {
            background: #e94560;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .product-card:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .product-card.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            color: #fff;
            display: block;
        }

        .product-meta {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }

        .product-price {
            color: #e94560;
            font-weight: bold;
        }

        .product-check {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card.selected .product-check::after {
            content: "✓";
            color: #e94560;
            font-weight: bold;
        }

        .action-actions {
            margin-top: 10px;
            text-align: right;
        }

        .add-to-cart-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <div id="chat-container">
            <header>
                <h1>👑 BuyerKing</h1>
                <p>Your Personal Shopping Assistant</p>
            </header>

            <div id="chat-history">
                <!-- Messages will appear here -->
                <div class="message bot">
                    Hello! I'm the BuyerKing Assistant. How can I help you today?
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Ask about tenders...">
                <button id="sendBtn" class="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            </section>
        </div>

        <script src="js/app.js"></script>
</body>

</html>
